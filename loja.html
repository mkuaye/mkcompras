<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja — MKcompras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/web/css/styles.css" />
  <link rel="stylesheet" href="/web/css/catalog.css" />
</head>
<body>

  <header>
    <div class="logo">MKcompras</div>
    <nav class="nav">
      <a href="/" class="nav-link">Converter link</a>
      <a href="/loja" class="nav-link active">Loja</a>
    </nav>
  </header>

  <div class="catalog-hero">
    <h1>Produtos <span>selecionados</span></h1>
    <p>Clique e compre pelo link de afiliado — mesmo produto, mesmo preço, sem custo extra pra você.</p>
  </div>

  <div class="catalog-controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M13 13l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search" placeholder="Buscar produto..." autocomplete="off" />
    </div>
    <div class="filter-row">
      <div class="filter-group" id="platform-filters">
        <button class="filter-btn active" data-platform="">Todas</button>
        <button class="filter-btn" data-platform="shopee"><span class="dot dot-shopee"></span> Shopee</button>
        <button class="filter-btn" data-platform="mercadolivre"><span class="dot dot-ml"></span> Mercado Livre</button>
        <button class="filter-btn" data-platform="amazon"><span class="dot dot-amazon"></span> Amazon</button>
      </div>
      <select id="category-select">
        <option value="">Todas as categorias</option>
      </select>
    </div>
  </div>

  <div class="catalog-wrap">
    <div id="product-grid" class="product-grid"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5" opacity=".3"/><path d="M16 24h16M24 16v16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/></svg>
      <p id="empty-msg">Nenhum produto encontrado.</p>
    </div>
    <div id="loading-state" class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <footer>
    MKcompras — converta links, ganhe comissão.
  </footer>

  <script src="/web/js/loja.js" defer></script>
</body>
</html>
